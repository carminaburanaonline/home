<!DOCTYPE html>
<html lang="en">
<head>
  <title>CBO</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500" />

  <!-- Get primary key of the source from the URL -->
  <script>
    const params = new URLSearchParams(document.location.search);
    const source_pk = params.get("pk");
  </script>

  <!-- Add additional CSS in static file -->
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/layout-generic.css"/>
</head>
<body>
<div class="page-container">
  <!-- Navbar + header -->
  <div data-include="header"></div>

  <main style="display: flex; flex: 1;">
    <div class="flex-column" style="flex: 20%">
      <!-- add side content here -->
    </div>
    <div id="metadata" style="flex: 80%;"></div>
    <script>
      var source;
      $.when(
        $.getJSON("json/sources.json", function(data) {
          sources = data;
        })
      ).then(function() {
        var source = sources.find((element) => element.pk == source_pk);
        s = `
          <h2>${source.bib_id}</a></h1>
          <h3>${source.location} (${source.country})</h2>`;

        if (source.century) {
          s += `
            <h4>Datation</h4>
            <p>${source.century} century.</p>`;
        }
        if (source.notation) {
          s += `
            <h4>Musical notation</h4>
            <p>${source.notation}.</p>`;
        }
        if (source.url) {
          s += `
            <h4>External link</h4>
            <a href='${source.url}' target='_blank'>${source.url}</a>`;
        }
        $("#metadata").html(s);
      });
    </script>
  </main>


  <!-- Footer -->
  <footer class="cbo-center cbo-black cbo-padding-16" data-include="footer"></footer>
</div>

<script src="js/data_include.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CBO Sources</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <!-- Add additional CSS in static file -->
    <link rel="stylesheet" href="css/ui-components.css"/>
    <link rel="stylesheet" href="css/layout-generic.css"/>
    <style>
      #sourcesTable {
        table-layout: fixed;
        width: 100%;
      }

      #sourcesTable th:nth-child(1),
      #sourcesTable td:nth-child(1) {
        width: 25%;   /* RISM */
      }

      #sourcesTable th:nth-child(2),
      #sourcesTable td:nth-child(2) {
        width: 15%;   /* Country */
      }

      #sourcesTable th:nth-child(3),
      #sourcesTable td:nth-child(3) {
        width: 20%;   /* City */
      }

      #sourcesTable th:nth-child(4),
      #sourcesTable td:nth-child(4) {
        width: 30%;   /* Library */
      }

      #sourcesTable th:nth-child(5),
      #sourcesTable td:nth-child(5) {
        width: 10%;   /* Links */
      }

      .toggle-btn {
        border: none;
        background: none;
        cursor: pointer;
        font-size: 0.8em;
      }

      .details-row td {
        background: #f9f9f9;
      }

      .details-box {
        padding: 8px 10px;
        font-size: 0.9em;
        line-height: 1.4;
      }

      .th-label {
        position: relative;
        display: inline-block;
      }

      .info-icon {
        display: inline-block;
        margin-left: 5px;
        font-size: 0.8em;
        width: 16px;
        height: 16px;
        line-height: 16px;
        text-align: center;
        border-radius: 50%;
        background: #ddd;
        color: #444;
        cursor: default;
      }

      .info-tooltip {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background: white;
        border: 1px solid #ccc;
        padding: 8px 10px;
        font-size: 0.85em;
        white-space: nowrap;
        z-index: 200;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }

      .info-tooltip img {
        height: 14px;
        vertical-align: middle;
        margin-right: 4px;
      }

      .info-icon:hover + .info-tooltip,
      .info-tooltip:hover {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <!-- Navbar + header -->
      <div data-include="header"></div>

      <main style="display: flex; flex: 1;">
        <div class="main flex-column">
          <h1>Sources</h1>

          <table id="sourcesTable">
            <thead>
              <tr>
                <th>RISM</th>
                <th>Country</th>
                <th>City</th>
                <th>Library</th>
                <th>
                  <span class="th-label">
                    Links
                    <span class="info-icon">i</span>

                    <div class="info-tooltip">
                      <div>📄 Catalogue description</div>
                      <div>🖼 Images (external website)</div>
                      <div>
                        <img src="img/IIIF_Logo.png" alt="IIIF" height="16px">
                        IIIF Manifest
                      </div>
                    </div>
                  </span>
                </th>
              </tr>
              <tr class="filters">
                <th><input type="text" id="filter-rism"></th>
                <th><input type="text" id="filter-country"></th>
                <th><input type="text" id="filter-city"></th>
                <th><input type="text" id="filter-library"></th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

        </div>
      </main>

      <!-- Footer -->
      <footer class="cbo-center cbo-black cbo-padding-16" data-include="footer"></footer>
    </div>

    <script type="module">
      import { initSourcesPage } from './js/sources/sourcesPage.js';
      initSourcesPage();
    </script>
    <script type="module" src="js/includes.js"></script>

  </body>
</html>

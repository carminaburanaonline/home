<!DOCTYPE html>
<html lang="en">
<head>
  <title>CBO Sources</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!-- Add additional CSS in static file -->
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/layout-generic.css"/>
</head>
<body>
<div class="page-container">
  <!-- Navbar + header -->
  <div data-include="header"></div>

  <main style="display: flex; flex: 1;">
    <div class="flex-column">
      <h1>Sources</h1>

      <input type="text" id="searchInput" onkeyup="filterSources()" placeholder="Search...">
      <script>
        // This script makes the search input work
        function filterSources() {
          let filter = $("#searchInput").val().toLowerCase();
          $("tr:not(.head)").each(function() {
            let txt = '';
            $(this).children("td").each(function() { txt += $(this).text() + "|"; });
            console.log(txt)
            if (txt.toLowerCase().indexOf(filter) > -1) {
              $(this).show();
            } else {
              $(this).hide();
            }
          });
        }
      </script>
      <table id="sourcesTable" style="width: 100%; border-spacing: 0 2px;">
        <tr class="head">
          <th style="width: 10%;">Country</th>
          <th style="width: 70%;">Location</th>
          <th style="width: 20%;">ID</th>
        </tr>
      </table>
      <script src="js/sources_table.js"></script>
    </div>
  </main>

  <!-- Footer -->
  <footer class="cbo-center cbo-black cbo-padding-16" data-include="footer"></footer>
</div>

<script src="js/data_include.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>CBO Items</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!-- Add additional CSS in static file -->
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/layout-generic.css"/>
  <style>
    th {
      text-align: left;
    }

    #searchInput {
      width: 100%;
    }
  </style>
</head>
<body>
<div class="page-container">
  <!-- Navbar + header -->
  <div data-include="header"></div>

  <main style="display: flex; flex: 1;">
    <div class="flex-column" style="flex: 20%">
      <!-- add left-side content here -->
    </div>
    <div style="flex: 70%">
      <h1>Edited items</h1>

      <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search...">
      <script>
        // This script makes the search input work
        function filterItems() {
          let filter = $("#searchInput").val().toLowerCase();
          $("tr:not(.head)").each(function() {
            let txt = '';
            $(this).children("td").each(function() { txt += $(this).text() + "|"; });
            console.log(txt)
            if (txt.toLowerCase().indexOf(filter) > -1) {
              $(this).show();
            } else {
              $(this).hide();
            }
          });
        }
      </script>
      <table id="itemsTable" style="width: 100%; border-spacing: 0 2px;">
        <tr class="head">
          <th>CB #</th>
          <th>Title</th>
          <th>Source</th>
        </tr>
      </table>
      <script src="js/items_table.js"></script>
    </div>

    <div class="flex-column" style="flex: 10%">
      <!-- add right-side content here -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="cbo-center cbo-black cbo-padding-16" data-include="footer"></footer>
</div>

<script src="js/data_include.js"></script>

</body>
</html>

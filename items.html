<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CBO Items</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <!-- Add additional CSS in static file -->
    <link rel="stylesheet" href="css/ui-components.css"/>
    <link rel="stylesheet" href="css/layout-generic.css"/>
  </head>
  <body>
    <div class="page-container">
      <!-- Header -->
      <div data-include="header"></div>

      <main style="display: flex; flex: 1;">
        <div class="flex-column" style="flex: 20%">
          <!-- add left-side content here (?) -->
        </div>
        <div style="flex: 80%">
          <h1>Edited items</h1>

          <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search..." style="width: 100%;">
          <script src="js/items/filterItems.js"></script>

          <table id="itemsTable" style="width: 100%; border-spacing: 0 2px;">
            <tr class="head">
              <th>CB #</th>
              <th>Title</th>
              <th>Source</th>
            </tr>
          </table>
        </div>

        <div class="flex-column" style="flex: 10%">
          <!-- add right-side content here -->
        </div>
      </main>

      <!-- Footer -->
      <footer class="cbo-center cbo-black cbo-padding-16" data-include="footer"></footer>
    </div>

    <script type="module">
      import { initItemsPage } from './js/items/itemsPage.js';
      initItemsPage();
    </script>
    <script type="module" src="js/includes.js"></script>

  </body>
</html>

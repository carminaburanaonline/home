<!-- Harmonized template for text-based items -->

<div id="itemCoreView" class="item-specific">

  <!-- Button / tab bar -->
  <div class="tab">

    <button id="openFormattedText" class="item-specific tablinks activable" data-tab-target="formattedText" data-i18n="formatted"></button>

    <button id="openContinuousText" class="item-specific tablinks activable" data-tab-target="continuousText" data-i18n="continuous"></button>

    <!-- Dropdown -->
    <div class="dropdown" style="margin-left:auto">
      <button id="dropBtn" class="item-specific">☰</button>

      <div class="dropdown-menu" style="right: 0;">
        <button id="toggleNeumesButton" class="item-specific toggleable active">Neumes</button>
        <button id="toggleSyllablesButton" class="item-specific toggleable">Syllabation</button>
        <button id="toggleVersificationButton" class="item-specific toggleable">Versification</button>
        <button id="togglePunctuationButton" class="item-specific toggleable" data-i18n="originalPunctuation"></button>
        <button id="toggleCriticalApparatus" class="item-specific toggleable active" data-i18n="criticalApparatus"></button>
      </div>
    </div>

  </div>

  <!-- Tab content -->
  <div class="tabcontent">

    <input type="text" id="searchInput" class="item-specific" placeholder="Search..." style="margin-bottom: 2px;">

    <div id="mainContainer" class="item-specific editorial">

      <div id="formattedText" class="item-specific" style="font-size: 16px;"></div>
      <div id="continuousText" class="item-specific hidden" style="font-size: 16px;"></div>

      <div id="apparatusText" class="item-specific no-break">
        <hr />
      </div>

      <div id="apparatusNeume" class="item-specific no-break"></div>

    </div>

  </div>

</div>
